<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Challenge 02 - Contacts App</title>
    <!-- load React/ReactDOM/Babel from CDN for simplicity -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .loader { font-size: 24px; }
        .contact { margin-bottom: 8px; }
        .contact button { margin-left: 8px; }
        form { margin-top: 16px; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
function Loader() {
    return <div className="loader">Loading...</div>;
}

function ContactItem({ contact, onDelete }) {
    return (
        <div className="contact">
            {contact.name} - {contact.phone}
            <button onClick={() => onDelete(contact.id)}>Delete</button>
        </div>
    );
}

function ContactList({ contacts, onDelete }) {
    if (contacts.length === 0) return <p>No contacts.</p>;
    return (
        <div>
            {contacts.map(c => (
                <ContactItem key={c.id} contact={c} onDelete={onDelete} />
            ))}
        </div>
    );
}

function ContactForm({ onAdd }) {
    const [name, setName] = React.useState('');
    const [phone, setPhone] = React.useState('');

    const handleSubmit = e => {
        e.preventDefault();
        if (!name.trim() || !phone.trim()) return;
        onAdd({ name, phone });
        setName('');
        setPhone('');
    };

    return (
        <form onSubmit={handleSubmit}>
            <input
                placeholder="Name"
                value={name}
                onChange={e => setName(e.target.value)}
            />
            <input
                placeholder="Phone"
                value={phone}
                onChange={e => setPhone(e.target.value)}
            />
            <button type="submit">Add</button>
        </form>
    );
}

function App() {
    const [loading, setLoading] = React.useState(true);
    const [contacts, setContacts] = React.useState([]);
    const nextId = React.useRef(1);

    React.useEffect(() => {
        // simulate load
        setTimeout(() => {
            const initial = [
                { id: nextId.current++, name: 'Alice', phone: '123-456' },
                { id: nextId.current++, name: 'Bob', phone: '987-654' }
            ];
            setContacts(initial);
            setLoading(false);
        }, 1500);
    }, []);

    const addContact = ({ name, phone }) => {
        setContacts(prev => [
            ...prev,
            { id: nextId.current++, name, phone }
        ]);
    };

    const deleteContact = id => {
        setContacts(prev => prev.filter(c => c.id !== id));
    };

    return (
        <div>
            <h1>Contacts</h1>
            {loading ? (
                <Loader />
            ) : (
                <>
                    <ContactList contacts={contacts} onDelete={deleteContact} />
                    <ContactForm onAdd={addContact} />
                </>
            )}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
